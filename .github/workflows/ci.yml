name: CI Pipeline

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ─── Build ────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Build (native)
        run: cargo build --verbose

      - name: Build (WASM release)
        run: cargo build --target wasm32-unknown-unknown --release --verbose

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: contract-wasm
          path: target/wasm32-unknown-unknown/release/*.wasm
          retention-days: 7

  # ─── Lint ─────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-lint-${{ hashFiles('**/Cargo.lock') }}

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # ─── Test + Coverage ──────────────────────────────────────────────────────
  test:
    name: Test & Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}

      - name: Install cargo-tarpaulin
        run: cargo install cargo-tarpaulin --locked

      - name: Run tests with coverage
        run: |
          cargo tarpaulin \
            --all \
            --timeout 120 \
            --out Xml Html \
            --output-dir coverage/

      - name: Upload coverage HTML report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/
          retention-days: 14

      - name: Post coverage summary to PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const xml = fs.readFileSync('coverage/cobertura.xml', 'utf8');
            const match = xml.match(/line-rate="([\d.]+)"/);
            const pct = match ? (parseFloat(match[1]) * 100).toFixed(1) : 'N/A';
            const emoji = parseFloat(pct) >= 80 ? '✅' : '⚠️';
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `## ${emoji} Coverage Report\n\n**Line coverage:** ${pct}%\n\n> Target: ≥ 80%. Download the full HTML report from the [Actions artifacts](https://github.com/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}).`
            });

      - name: Enforce minimum coverage
        run: |
          XML=coverage/cobertura.xml
          RATE=$(grep -oP 'line-rate="\K[\d.]+' "$XML" | head -1)
          PCT=$(echo "$RATE * 100" | bc)
          echo "Coverage: ${PCT}%"
          if (( $(echo "$PCT < 80" | bc -l) )); then
            echo "❌ Coverage ${PCT}% is below the 80% threshold."
            exit 1
          fi
          echo "✅ Coverage ${PCT}% meets the threshold."

  # ─── Contract size check ──────────────────────────────────────────────────
  size-check:
    name: Contract Size Check
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: contract-wasm
          path: wasm/

      - name: Install Soroban CLI
        run: cargo install soroban-cli --locked

      - name: Optimize WASM
        run: |
          for f in wasm/*.wasm; do
            soroban contract optimize --wasm "$f" --wasm-out "${f%.wasm}.optimized.wasm"
          done

      - name: Check contract size (≤ 64 KB)
        run: |
          MAX_BYTES=65536
          FAILED=0
          for f in wasm/*.optimized.wasm; do
            SIZE=$(stat -c%s "$f")
            echo "$(basename $f): ${SIZE} bytes"
            if [ "$SIZE" -gt "$MAX_BYTES" ]; then
              echo "❌ $(basename $f) exceeds 64 KB limit (${SIZE} bytes)"
              FAILED=1
            else
              echo "✅ $(basename $f) within limit"
            fi
          done
          [ "$FAILED" -eq 0 ] || exit 1

  # ─── Benchmarks ───────────────────────────────────────────────────────────
  benchmark:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: cargo bench --all 2>&1 | tee benchmark-output.txt

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: benchmark-output.txt
          retention-days: 7