name: Test & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        rust: [stable, nightly]
    steps:
      - uses: actions/checkout@v3

      - name: Install Rust
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}
          targets: wasm32-unknown-unknown

      - name: Run tests
        run: cargo test --all

      - name: Run fuzz tests
        run: cargo test --test fuzz --test fuzz_navigation --test fuzz_trading --test fuzz_yield -- --test-threads=1

      - name: Build release
        run: cargo build --target wasm32-unknown-unknown --release
