name: Deploy to Futurenet

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      network:
        description: Target network
        required: true
        default: futurenet
        type: choice
        options: [futurenet, testnet]

env:
  CARGO_TERM_COLOR: always
  SOROBAN_NETWORK: ${{ github.event.inputs.network || 'futurenet' }}

jobs:
  # ─── Build optimized WASM ────────────────────────────────────────────────
  build:
    name: Build Release WASM
    runs-on: ubuntu-latest
    outputs:
      wasm-name: ${{ steps.find-wasm.outputs.name }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-deploy-${{ hashFiles('**/Cargo.lock') }}

      - name: Build WASM
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Install Soroban CLI
        run: cargo install soroban-cli --locked

      - name: Optimize WASM
        id: find-wasm
        run: |
          WASM=$(ls target/wasm32-unknown-unknown/release/*.wasm | grep -v deps | head -1)
          soroban contract optimize --wasm "$WASM" --wasm-out optimized.wasm
          echo "name=$(basename $WASM)" >> "$GITHUB_OUTPUT"
          echo "Optimized size: $(stat -c%s optimized.wasm) bytes"

      - name: Upload optimized WASM
        uses: actions/upload-artifact@v4
        with:
          name: optimized-wasm
          path: optimized.wasm
          retention-days: 30

  # ─── Deploy ──────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to ${{ github.event.inputs.network || 'futurenet' }}
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: ${{ github.event.inputs.network || 'futurenet' }}
      url: https://stellar.expert/explorer/futurenet
    steps:
      - uses: actions/checkout@v4

      - name: Install Soroban CLI
        run: cargo install soroban-cli --locked

      - name: Download optimized WASM
        uses: actions/download-artifact@v4
        with:
          name: optimized-wasm

      - name: Configure Soroban network
        run: |
          if [ "$SOROBAN_NETWORK" = "futurenet" ]; then
            soroban network add \
              --rpc-url https://rpc-futurenet.stellar.org \
              --network-passphrase "Test SDF Future Network ; October 2024" \
              futurenet
          else
            soroban network add \
              --rpc-url https://soroban-testnet.stellar.org \
              --network-passphrase "Test SDF Network ; September 2015" \
              testnet
          fi

      - name: Import deployer identity
        run: |
          echo "${{ secrets.DEPLOYER_SECRET_KEY }}" | \
            soroban keys add deployer --secret-key

      - name: Deploy contract
        id: deploy
        run: |
          CONTRACT_ID=$(soroban contract deploy \
            --wasm optimized.wasm \
            --source deployer \
            --network "$SOROBAN_NETWORK")
          echo "contract-id=$CONTRACT_ID" >> "$GITHUB_OUTPUT"
          echo "✅ Deployed contract: $CONTRACT_ID"

      - name: Initialize contract
        run: |
          soroban contract invoke \
            --id "${{ steps.deploy.outputs.contract-id }}" \
            --source deployer \
            --network "$SOROBAN_NETWORK" \
            --fn initialize

      - name: Smoke test — scan_nebula
        run: |
          RESULT=$(soroban contract invoke \
            --id "${{ steps.deploy.outputs.contract-id }}" \
            --source deployer \
            --network "$SOROBAN_NETWORK" \
            --fn scan_nebula \
            --arg 42)
          echo "scan_nebula result: $RESULT"
          [ -n "$RESULT" ] || (echo "❌ scan_nebula returned empty result" && exit 1)

      - name: Save deployment record
        run: |
          mkdir -p deployments
          echo '{
            "network": "${{ env.SOROBAN_NETWORK }}",
            "contractId": "${{ steps.deploy.outputs.contract-id }}",
            "deployedAt": "'$(date -u +"%Y-%m-%dT%H:%M:%SZ")'",
            "commit": "${{ github.sha }}",
            "actor": "${{ github.actor }}"
          }' > deployments/${{ env.SOROBAN_NETWORK }}-latest.json
          cat deployments/${{ env.SOROBAN_NETWORK }}-latest.json

      - name: Upload deployment record
        uses: actions/upload-artifact@v4
        with:
          name: deployment-${{ env.SOROBAN_NETWORK }}-${{ github.sha }}
          path: deployments/
          retention-days: 90

      - name: Post deployment summary
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const status = '${{ job.status }}' === 'success' ? '✅' : '❌';
            const contractId = '${{ steps.deploy.outputs.contract-id }}';
            const network = '${{ env.SOROBAN_NETWORK }}';
            const commit = '${{ github.sha }}'.slice(0, 7);
            await github.rest.repos.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: '${{ github.sha }}',
              body: `## ${status} Deployment to ${network}\n\n**Contract ID:** \`${contractId}\`\n**Commit:** \`${commit}\`\n**Network:** ${network}\n**Actor:** ${{ github.actor }}`
            });