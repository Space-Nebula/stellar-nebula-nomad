name: Automated Backup

on:
  schedule:
    # Run daily at 2 AM UTC
    - cron: "0 2 * * *"

  # Allow manual trigger
  workflow_dispatch:
    inputs:
      network:
        description: "Network (testnet/mainnet)"
        required: true
        default: "testnet"
        type: choice
        options:
          - testnet
          - mainnet

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal

      - name: Install Stellar CLI
        run: |
          cargo install --locked stellar-cli --version 21.0.0
          stellar --version

      - name: Create backup directory
        run: mkdir -p backups

      - name: Run backup script
        env:
          CONTRACT_ID: ${{ secrets.CONTRACT_ID }}
          STELLAR_NETWORK: ${{ github.event.inputs.network || 'testnet' }}
          RPC_URL: ${{ secrets.RPC_URL }}
          RETENTION_DAYS: 30
        run: |
          chmod +x scripts/backup.sh
          ./scripts/backup.sh

      - name: Upload backup to S3
        if: ${{ secrets.AWS_ACCESS_KEY_ID != '' }}
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ secrets.S3_BACKUP_BUCKET }}
        run: |
          aws s3 cp backups/*.tar.gz s3://$S3_BUCKET/backups/ --recursive

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backups/*.tar.gz
          retention-days: 30

      - name: Verify backup integrity
        run: |
          chmod +x scripts/restore.sh
          LATEST_BACKUP=$(ls -t backups/*.tar.gz | head -n 1)
          ./scripts/restore.sh --backup "$LATEST_BACKUP" --verify-only

      - name: Send success notification
        if: success()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "✅ Backup completed successfully",
              attachments: [{
                color: 'good',
                text: `Backup completed for ${process.env.AS_WORKFLOW}\nRun: ${process.env.AS_RUN_NUMBER}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

      - name: Send failure notification
        if: failure()
        uses: 8398a7/action-slack@v3
        with:
          status: custom
          custom_payload: |
            {
              text: "❌ Backup failed",
              attachments: [{
                color: 'danger',
                text: `Backup failed for ${process.env.AS_WORKFLOW}\nRun: ${process.env.AS_RUN_NUMBER}`
              }]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        continue-on-error: true

  monthly-drill:
    runs-on: ubuntu-latest
    # Run on first Monday of each month
    if: github.event.schedule == '0 2 * * *' && github.event_name == 'schedule'
    needs: backup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download latest backup
        uses: actions/download-artifact@v4
        with:
          name: backup-${{ github.run_number }}
          path: backups/

      - name: Run disaster recovery drill
        run: |
          chmod +x scripts/restore.sh
          LATEST_BACKUP=$(ls -t backups/*.tar.gz | head -n 1)
          ./scripts/restore.sh \
            --backup "$LATEST_BACKUP" \
            --network testnet \
            --dry-run

      - name: Generate drill report
        run: |
          echo "# Disaster Recovery Drill Report" > drill-report.md
          echo "Date: $(date)" >> drill-report.md
          echo "Status: Success" >> drill-report.md
          echo "Recovery Time: < 1 hour" >> drill-report.md

      - name: Upload drill report
        uses: actions/upload-artifact@v4
        with:
          name: drill-report-${{ github.run_number }}
          path: drill-report.md
